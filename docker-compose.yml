version: '3.8'

services:
  dashboard:
    build: .
    container_name: server-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

# Utilisation:
# docker-compose up -d     - Lancer le dashboard
# docker-compose logs -f   - Voir les logs
# docker-compose down      - Arrêter le dashboard

